name: README.md gh-pages sync
concurrency:
  group: readme-gh-pages-sync
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - README.md

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: gh-pages

      - name: Sync README.md to gh-pages
        run: |
          git config user.name "Kong's Team k8s bot"
          git config user.email "team-k8s+github-bot@konghq.com"
          git checkout main -- README.md
          git commit -m "chore: sync README.md from main branch" || echo "No changes to commit"
          git push origin gh-pages

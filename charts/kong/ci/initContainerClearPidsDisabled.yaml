ingressController:
  enabled: false

image:
  repository: kong/kong-gateway-dev
  tag: 3.15.0.0-rc.5-distroless

deployment:
  kong:
    initContainers:
      clearStalePid:
        enabled: false

# NOTE: The purpose of those values below is to:
# - to speed up, the test
# - to prevent anonymous reports from being sent
readinessProbe:
  initialDelaySeconds: 1
  periodSeconds: 1

env:
  anonymous_reports: "off"

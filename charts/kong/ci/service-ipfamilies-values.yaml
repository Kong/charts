# render Services with explicit IP family configuration

proxy:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv6
    - IPv4

cluster:
  enabled: true
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv6
  tls:
    enabled: true

ingressController:
  enabled: false

env:
  anonymous_reports: "off"
